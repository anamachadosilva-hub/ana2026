<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Edite o Seu Site</title>
    <style>
        /* CONFIGURAÇÕES DE CORES E ESTILOS (CSS) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f3efb4;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #f1e28a; /* Mude a cor do topo aqui */
            color: rgb(241, 147, 147);
            padding: 30px;
        }

        .conteudo {
            background-color: rgb(233, 120, 120);
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
        }

        .foto-principal {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
        }

        p {
            color: #3e7916;
            font-size: 18px;
            line-height: 1.6;
        }

        footer {
            background-color: #b1eedc;
            color: rgb(163, 10, 143);
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <!-- TOPO DO SITE -->
    <header>
        <!-- INSTRUÇÃO DO TÍTULO PRINCIPAL -->
        <h1>[Moda Primaveira]</h1>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo">
       
        <!-- INSTRUÇÃO DA IMAGEM -->
        <!-- Aluno: Substitua o link do 'src' pelo link de uma imagem do Google se quiser mudar a foto -->
        <img class="foto-principal" src="https://www.patronatoplbm.com.br/wp-content/uploads/2023/06/formacao_como-escolher-a-melhor-escola-para-os-filhos.jpg&quot; alt="Imagem">

        <!-- INSTRUÇÃO DO SUBTÍTULO -->
        <h2>[Faça A Sua Moda]</h2>
       
        <!-- INSTRUÇÃO DO TEXTO EXPLICATIVO -->
        <p>
            [As melhores roupas de primaveira se encontram aqui!
            Vendemos para o Brasil todo e para alguns países da América Latina]
        </p>

    </div>

    <!-- RODAPÉ DO SITE -->
    <footer>
        <!-- INSTRUÇÃO DO CRÉDITO -->
        <p>Site criado por: [Ana Júlia Machado da Silva 1B]</p>
    </footer>

</body>
</html>
